<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            border: 1px solid #ccc;
            padding: 25px;
            width: 260px;
            text-align: center;
        }

        a {
            display: block;
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #333;
            text-decoration: none;
            color: black;
        }

        a:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Dashboard</h2>

    <a href="/home">Create Short URL</a>
    <a href="/logout">Logout</a>
</div>

</body>
</html>
